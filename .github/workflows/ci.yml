name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: NPM install
        run: npm install

      - name: NPM build
        run: |
          npm run build

      - name: NPM build for release
        run: |
          npm pack --pack-destination lib

      - name: Delete existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.0.0 --yes || true
          git push --delete origin v0.0.0 || true
          git tag -d v0.0.0 || true

      - name: Create new release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag v0.0.0
          git push origin v0.0.0
          gh release create v0.0.0 \
            --title "v0.0.0" \
            --notes "Development build from commit $(git rev-parse --short HEAD)" \
            --prerelease \
            lib/*
